hdl: "0.1.0"
extends: ../general.harness.yaml

pair:
  name: resonance
  archetype: mutual-amplification

  agents:
    agent_a:
      soul: ./resonance_soul.md
      model: haiku
      role: symmetric
      speaks_first: true

    agent_b:
      soul: ./resonance_soul.md
      model: haiku
      role: symmetric
      speaks_first: false

phases:
  initial: independent_gen_1

  states:
    independent_gen_1:
      description: Both agents generate independently — full isolation
      agent_lead: both
      max_rounds: 1
      tools:
        agent_a: [read, write, edit, search, grep, bash, test, get_current_state, take_action]
        agent_b: [read, write, edit, search, grep, bash, test, get_current_state, take_action]
      handoff_mode: isolated
      phase_signal: generative
      transitions:
        - to: reveal_1
          trigger: automatic
          guard: both_complete

    reveal_1:
      description: Both agents see partner's work for the first time
      agent_lead: both
      max_rounds: 1
      tools:
        agent_a: [read, search, grep, get_current_state, take_action]
        agent_b: [read, search, grep, get_current_state, take_action]
      handoff_mode: full_context
      reveal:
        show_partner_work: true
        show_partner_reasoning: true
      transitions:
        - to: competitive_response_1
          trigger: automatic
          guard: round_limit

    competitive_response_1:
      description: Each agent responds with an improved version incorporating partner insights
      agent_lead: both
      max_rounds: 1
      tools:
        agent_a: [read, write, edit, search, grep, bash, test, get_current_state, take_action]
        agent_b: [read, write, edit, search, grep, bash, test, get_current_state, take_action]
      handoff_mode: isolated
      phase_signal: generative
      transitions:
        - to: reveal_2
          trigger: automatic
          guard: both_complete

    reveal_2:
      description: Second reveal — competitive responses shown
      agent_lead: both
      max_rounds: 1
      tools:
        agent_a: [read, search, grep, get_current_state, take_action]
        agent_b: [read, search, grep, get_current_state, take_action]
      handoff_mode: full_context
      reveal:
        show_partner_work: true
        show_partner_reasoning: true
      transitions:
        - to: competitive_response_2
          trigger: automatic
          guard: round_limit
          convergence_check: true
        - to: integration
          trigger: automatic
          guard: max_iterations_reached

    competitive_response_2:
      description: Optional third iteration if quality is still ratcheting
      agent_lead: both
      max_rounds: 1
      tools:
        agent_a: [read, write, edit, search, grep, bash, test, get_current_state, take_action]
        agent_b: [read, write, edit, search, grep, bash, test, get_current_state, take_action]
      handoff_mode: isolated
      phase_signal: generative
      transitions:
        - to: integration
          trigger: automatic
          guard: both_complete

    integration:
      description: Collaborative merge — both agents produce the final output together
      agent_lead: both
      max_rounds: 4
      tools:
        agent_a: [read, write, edit, search, grep, bash, test, conversation, get_current_state, take_action]
        agent_b: [read, write, edit, search, grep, bash, test, conversation, get_current_state, take_action]
      handoff_mode: full_context
      phase_signal: evaluative
      transitions:
        - to: complete
          trigger: explicit
          guard: both_agree
          requires:
            - integration_manifest
        - to: escalation
          trigger: automatic
          guard: round_limit

    escalation:
      description: Human intervention needed
      agent_lead: none
      action: pause_for_human

    complete:
      description: Integrated output produced
      terminal: true

turns:
  default_protocol: parallel

  protocols:
    parallel:
      isolation: true
      sync_point: both_complete
      actions:
        both: [generate, document_reasoning, improve, extend]

  phase_overrides:
    independent_gen_1:
      protocol: parallel
    reveal_1:
      protocol: alternating
    competitive_response_1:
      protocol: parallel
    reveal_2:
      protocol: alternating
    competitive_response_2:
      protocol: parallel
    integration:
      protocol: alternating

artifacts:
  types:
    generation:
      producer: both
      schema:
        approach: string
        reasoning: string
        output: file_references
        alternatives_considered: array
      route_to: shared_workspace

    competitive_response:
      producer: both
      schema:
        what_adopted_from_partner: array
        what_improved: array
        what_rejected_and_why: array
        output: file_references
      route_to: shared_workspace

    integration_manifest:
      producer: both
      schema:
        elements_from_a: array
        elements_from_b: array
        novel_synthesis: array
        adoption_balance: float
      route_to: shared_workspace

  workspace:
    type: filesystem
    path: ./workspace
    per_agent_dirs: true
    agent_dirs:
      agent_a: ./workspace/agent_a
      agent_b: ./workspace/agent_b
    shared_dir: ./workspace/integrated

guardrails:
  circuit_breakers:
    max_competitive_iterations: 3

  monitors:
    convergence:
      description: Agents producing identical outputs — the primary threat
      metric: semantic_distance
      threshold: 0.15
      action: inject_disruption
      check_frequency: every_reveal

    quality_ratchet:
      description: Agents not actually improving on each other
      metric: quality_delta_between_rounds
      threshold: 0.05
      action: force_integration

    isolation_integrity:
      description: Agents accessing partner workspace during generation
      metric: cross_workspace_reads
      threshold: 0
      action: terminate_and_alert

    integration_balance:
      description: One agent's work dominating the merge
      metric: adoption_balance
      expected_range: [0.30, 0.70]
      action: inject_balance_prompt

  behavioral_contracts:
    both:
      - must_generate_before_reading_partner
      - must_document_reasoning_during_generation
      - must_identify_adopted_elements_in_response
      - must_identify_elements_from_both_in_integration

observability:
  quality_metrics:
    rounds_to_resolution: true
    quality_ratchet_delta: true
    integration_adoption_balance: true

  interaction_quality:
    convergence_rate: true
    disruption_injection_count: true

  drift_signals:
    echoing_rate: true
