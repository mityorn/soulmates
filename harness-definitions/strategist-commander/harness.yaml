hdl: "0.1.0"
extends: ../general.harness.yaml

pair:
  name: strategist-commander
  archetype: strategist-commander

  agents:
    strategist:
      soul: ./strategist_soul.md
      model: haiku
      role: receptive
      speaks_first: true

    commander:
      soul: ./commander_soul.md
      model: haiku
      role: autonomous
      speaks_first: false

phases:
  initial: strategic_design

  states:
    strategic_design:
      description: Strategist defines objectives, constraints, and units of work
      agent_lead: strategist
      max_rounds: 3
      tools:
        strategist: [read, search, grep, conversation, get_current_state, take_action]
        commander: [read, search, grep, conversation, get_current_state, take_action]
      handoff_mode: full_context
      phase_signal: generative
      transitions:
        - to: scope_assignment
          trigger: explicit
          guard: lead_signals
          requires:
            - strategic_plan

    scope_assignment:
      description: Strategist assigns a scoped unit of work to Commander
      agent_lead: strategist
      max_rounds: 2
      tools:
        strategist: [read, search, grep, conversation, get_current_state, take_action]
        commander: [read, search, grep, conversation, get_current_state, take_action]
      handoff_mode: full_context
      transitions:
        - to: tactical_execution
          trigger: explicit
          guard: both_agree
          requires:
            - scope_definition

    tactical_execution:
      description: Commander executes autonomously within assigned scope
      agent_lead: commander
      max_rounds: 8
      tools:
        strategist: []
        commander: [read, write, edit, search, grep, bash, test, get_current_state, take_action]
      handoff_mode: full_context
      phase_signal: generative
      scope_enforcement:
        enabled: true
        scope_source: scope_definition
        violation_action: warn_and_log
      transitions:
        - to: intel_report
          trigger: explicit
          guard: lead_signals
          requires:
            - execution_report
        - to: strategic_pivot
          trigger: explicit
          guard: assumption_failure
        - to: escalation
          trigger: automatic
          guard: round_limit

    intel_report:
      description: Commander reports ground truth back to Strategist
      agent_lead: commander
      max_rounds: 2
      tools:
        strategist: [read, search, grep, conversation, get_current_state, take_action]
        commander: [read, conversation, get_current_state, take_action]
      handoff_mode: full_context
      phase_signal: evaluative
      transitions:
        - to: assessment
          trigger: explicit
          guard: lead_signals
        - to: strategic_pivot
          trigger: explicit
          guard: lead_signals

    strategic_pivot:
      description: Strategist adapts the plan based on ground-truth intelligence
      agent_lead: strategist
      max_rounds: 3
      tools:
        strategist: [read, search, grep, conversation, get_current_state, take_action]
        commander: [read, conversation, get_current_state, take_action]
      handoff_mode: full_context
      phase_signal: evaluative
      transitions:
        - to: scope_assignment
          trigger: explicit
          guard: lead_signals
          requires:
            - revised_plan
        - to: escalation
          trigger: automatic
          guard: round_limit

    assessment:
      description: Both agents evaluate outcomes against strategic objectives
      agent_lead: both
      max_rounds: 2
      tools:
        strategist: [read, search, grep, conversation, get_current_state, take_action]
        commander: [read, search, grep, bash, test, conversation, get_current_state, take_action]
      handoff_mode: full_context
      phase_signal: evaluative
      transitions:
        - to: complete
          trigger: explicit
          guard: both_agree
        - to: scope_assignment
          trigger: explicit
          guard: lead_signals

    escalation:
      description: Human intervention needed
      agent_lead: none
      action: pause_for_human

    complete:
      description: All strategic objectives met
      terminal: true

turns:
  default_protocol: sequential

  protocols:
    sequential:
      order: [strategist, commander]
      actions:
        strategist: [define_objective, assign_scope, adapt_plan, evaluate_outcome, accept_intel]
        commander: [accept_scope, report_intel, report_assumption_failure, execute, request_clarification]

  phase_overrides:
    strategic_design:
      protocol: sequential
      order: [strategist, commander]
    scope_assignment:
      protocol: sequential
      order: [strategist, commander]
    tactical_execution:
      protocol: sequential
      order: [commander]
    intel_report:
      protocol: sequential
      order: [commander, strategist]
    strategic_pivot:
      protocol: sequential
      order: [strategist, commander]
    assessment:
      protocol: alternating

artifacts:
  types:
    strategic_plan:
      producer: strategist
      schema:
        objectives: array
        constraints: array
        units_of_work: array
        success_criteria: string
        assumptions: array
      route_to: [commander, shared_workspace]

    scope_definition:
      producer: strategist
      schema:
        unit: string
        boundaries:
          files: array
          directories: array
        objective: string
        constraints: array
        autonomy_level: full | guided | restricted
      route_to: commander

    execution_report:
      producer: commander
      schema:
        unit_completed: string
        outcome: success | partial | blocked
        findings: array
        assumption_validations:
          type: array
          items:
            assumption: string
            status: confirmed | violated | unknown
        ground_truth: string
      route_to: strategist

    revised_plan:
      producer: strategist
      schema:
        what_changed: string
        reason: string
        new_units: array
        dropped_units: array
      route_to: [commander, shared_workspace]

    code_submission:
      producer: commander
      content_type: file_references
      route_to: shared_workspace

guardrails:
  monitors:
    micromanagement:
      description: Strategist descending into tactical details
      metric: strategist_code_tool_usage
      threshold: 0
      action: inject_scope_reminder

    scope_violation:
      description: Commander modifying files outside assigned scope
      metric: out_of_scope_edits
      threshold: 0
      action: warn_and_log

    intelligence_suppression:
      description: Commander solving problems without reporting assumption failures
      metric: unreported_changes_rate
      threshold: 0.30
      action: inject_reporting_prompt

    strategic_rigidity:
      description: Strategist refusing to adapt plan after assumption failures
      metric: pivot_resistance_after_failure
      threshold: 2
      action: inject_adaptation_prompt

  behavioral_contracts:
    strategist:
      - must_not_write_implementation_code
      - must_define_scope_before_execution
      - must_adapt_plan_on_assumption_failure
      - must_define_success_criteria
    commander:
      - must_report_assumption_failures_immediately
      - must_stay_within_assigned_scope
      - must_provide_ground_truth_in_reports
      - owes_honest_assessment_not_obedience

observability:
  quality_metrics:
    rounds_to_resolution: true
    assumption_failure_rate: true
    scope_violation_rate: true
    strategic_pivot_count: true

  interaction_quality:
    autonomy_effectiveness: true
    intel_quality: true
